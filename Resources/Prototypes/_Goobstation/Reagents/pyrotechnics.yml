- type: reagent
  id: BlackPowder
  name: reagent-name-blackpowder
  group: Pyrotechnic
  desc: reagent-desc-blackpowder
  flavor: incredibly bitter
  physicalDesc: reagent-physical-desc-grainy
  color: black
  metabolisms:
    Poison:
      metabolismRate: 0.05 # slow, so that I can later implement it exploding when people are on fire/hot
      effects:
      - !type:HealthChange
        damage:
          types: # black powder is bad for your health.
            Poison: 0.2 # 4 damage/u
      - !type:SetSolutionTemperature # once your internal temp reaches 474, the blackpowder should be changed to that temp and go off
        conditions:
        - !type:Temperature
          min: 474
        amount: 100000 # thermal energy, not temperature!
